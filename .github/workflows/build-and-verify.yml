name: Build and Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies with retry
      run: |
        set -o pipefail
        for i in {1..3}; do
          if npm ci; then
            echo "Dependencies installed successfully on attempt $i"
            break
          else
            if [ $i -eq 3 ]; then
              echo "Failed to install dependencies after 3 attempts"
              exit 1
            fi
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          fi
        done
    
    - name: TypeScript type check
      run: npx tsc --noEmit
    
    - name: Expo prebuild (Android)
      run: npx expo prebuild --platform android --clean || echo "Expo prebuild completed with warnings"
    
    - name: Install Expo CLI (if not already installed)
      run: npm install -g expo-cli
    
    - name: Verify Expo project configuration
      run: npx expo doctor --checks
    
    - name: Run linting (if available)
      run: |
        if [ -f "package.json" ]; then
          if grep -q "eslint" package.json; then
            npx eslint . || echo "ESLint check completed"
          fi
        fi
